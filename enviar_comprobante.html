<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enviar Comprobante</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background:#121212; color:#f0f0f0; font-family:sans-serif; }
    .card { background:#1e1e1e; border:2px solid #333; }
    .form-control {
      background:#2a2a2a !important; border:1px solid #444 !important; color:#f0f0f0 !important;
    }
    .form-control:focus {
      border-color:#7c3aed !important; box-shadow:0 0 0 2px rgba(124,58,237,.25) !important;
    }
    .form-control::placeholder { color:#666 !important; }
    .form-label { color:#aaa; font-size:.85rem; }
    .btn-morado { background:#7c3aed; border:none; color:#fff; }
    .btn-morado:hover { background:#6d28d9; color:#fff; }
    .btn-morado:disabled { opacity:.6; }
    .upload-area {
      border:2px dashed #444; border-radius:8px; background:#2a2a2a;
      padding:1.5rem; text-align:center; cursor:pointer;
      position:relative; transition:border-color .2s;
    }
    .upload-area:hover { border-color:#7c3aed; }
    .upload-area input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    #preview-img { max-height:130px; border-radius:8px; border:1px solid #444; display:none; margin-top:.5rem; }
    #toast {
      position:fixed; top:1.5rem; left:50%; transform:translateX(-50%);
      z-index:9999; min-width:300px; display:none; border-radius:10px;
      padding:1rem 1.4rem; font-size:.9rem; text-align:center;
      box-shadow:0 8px 30px rgba(0,0,0,.5);
    }
    #toast.ok    { background:#0f2a1a; border:1px solid rgba(34,197,94,.3); color:#86efac; }
    #toast.error { background:#2a0f0f; border:1px solid rgba(239,68,68,.3);  color:#fca5a5; }
  </style>
</head>
<body>

<div style="background:#1a0a2e; border-bottom:2px solid #7c3aed; padding:.75rem 0;">
  <div class="container">
    <h5 class="mb-0" style="color:#c4b5fd;"><i class="bi bi-building-fill-check me-2"></i>Sistema Edificios — Enviar Comprobante</h5>
  </div>
</div>

<div id="toast"></div>

<div class="container py-4" style="max-width:520px;">

  <!-- PASO 1: Verificar -->
  <div class="card p-4 mb-3" id="paso1">
    <h6 style="color:#c4b5fd;" class="mb-3"><i class="bi bi-person-badge me-1"></i>Paso 1 — Verificar identidad</h6>
    <div class="mb-3">
      <label class="form-label">Departamento</label>
      <input type="text" class="form-control" id="inputDepto" placeholder="Ej: 201, 3B…">
      <div id="erDepto" style="font-size:.78rem;color:#f87171;display:none;"></div>
    </div>
    <div class="mb-3">
      <label class="form-label">Carnet de Identidad (CI)</label>
      <input type="text" class="form-control" id="inputCI" placeholder="Ej: 7854321">
      <div id="erCI" style="font-size:.78rem;color:#f87171;display:none;"></div>
    </div>
    <button class="btn btn-morado w-100" id="btnVerificar" onclick="verificar()">
      <span id="vText"><i class="bi bi-shield-check me-1"></i>Verificar</span>
      <span id="vLoad" style="display:none;"><span class="spinner-border spinner-border-sm me-1"></span>Verificando…</span>
    </button>
  </div>

  <!-- PASO 2: Subir comprobante -->
  <div class="card p-4" id="paso2" style="display:none;">
    <div class="alert mb-3 py-2 px-3" style="background:#1a2e1a;border:1px solid rgba(34,197,94,.3);color:#86efac;font-size:.85rem;">
      <i class="bi bi-patch-check-fill me-1"></i>
      Verificado: <strong id="nombreVerificado"></strong> — Depto <strong id="deptoVerificado"></strong>
    </div>
    <h6 style="color:#c4b5fd;" class="mb-3"><i class="bi bi-receipt me-1"></i>Paso 2 — Subir comprobante</h6>
    <div class="mb-3">
      <div class="upload-area" id="uploadArea">
        <input type="file" id="comprobante" accept="image/*,application/pdf" onchange="handleFile(this)">
        <i class="bi bi-cloud-arrow-up" style="font-size:1.8rem;color:#7c3aed;"></i>
        <p class="mt-1 mb-0">Haz clic o arrastra tu archivo</p>
        <p style="font-size:.72rem;color:#666;margin:0;">JPG, PNG, PDF — máx. 10MB</p>
      </div>
      <img id="preview-img" src="" alt="Vista previa">
      <div id="filenameLabel" style="font-size:.78rem;color:#6ee7b7;margin-top:.4rem;display:none;"></div>
      <div id="uploadStatus" style="font-size:.78rem;color:#a78bfa;margin-top:.4rem;display:none;"></div>
      <div id="fileError" style="font-size:.78rem;color:#f87171;display:none;">Sube el comprobante.</div>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-secondary" onclick="volver()"><i class="bi bi-arrow-left"></i> Volver</button>
      <button class="btn btn-morado flex-fill" id="btnEnviar" onclick="enviar()">
        <span id="eText"><i class="bi bi-send me-1"></i>Enviar comprobante</span>
        <span id="eLoad" style="display:none;"><span class="spinner-border spinner-border-sm me-1"></span>Enviando…</span>
      </button>
    </div>
  </div>

</div>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const GAS_URL    = 'https://script.google.com/macros/s/AKfycbzJZReANJd6X8qYKzyEt6gL3XZcZ22KhBDXRsjXOxAa1PYYw-W9qVTTkvxlAUPiQNQ/exec';
  const CLD_URL    = 'https://api.cloudinary.com/v1_1/dpfoul2dc/upload';
  const CLD_PRESET = 'Unsigned';

  let deptoOk = '', nombreOk = '';

  // ── Paso 1: Verificar ──────────────────────────────────────────────
  async function verificar() {
    const depto = document.getElementById('inputDepto').value.trim();
    const ci    = document.getElementById('inputCI').value.trim();
    er('erDepto',''); er('erCI','');

    if (!depto) { er('erDepto','Ingresa el departamento.'); return; }
    if (!ci)    { er('erCI',   'Ingresa tu CI.');           return; }

    setLoad('btnVerificar','vText','vLoad', true);

    let data;
    try {
      const res = await fetch(GAS_URL);
      data = await res.json();
    } catch(e) {
      toast('error','❌ Error de conexión con el servidor.'); 
      setLoad('btnVerificar','vText','vLoad', false); return;
    }

    // Buscar fila por departamento (clave del objeto)
    const fila = data[depto] || data[depto.toUpperCase()] ||
      Object.entries(data).find(([k]) => k.toLowerCase() === depto.toLowerCase())?.[1];

    if (!fila) {
      er('erDepto','Departamento no encontrado.');
      setLoad('btnVerificar','vText','vLoad', false); return;
    }

    // Verificar CI
    if (fila.carnet && fila.carnet !== ci) {
      er('erCI','CI incorrecto.');
      setLoad('btnVerificar','vText','vLoad', false); return;
    }

    // OK
    deptoOk  = depto;
    nombreOk = fila.inquilino || 'Inquilino';
    document.getElementById('nombreVerificado').textContent = nombreOk;
    document.getElementById('deptoVerificado').textContent  = deptoOk;
    setLoad('btnVerificar','vText','vLoad', false);
    document.getElementById('paso1').style.display = 'none';
    document.getElementById('paso2').style.display = '';
  }

  function volver() {
    document.getElementById('paso2').style.display = 'none';
    document.getElementById('paso1').style.display = '';
  }

  // ── Paso 2: Subir ──────────────────────────────────────────────────
  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 10*1024*1024) {
      er('fileError','El archivo supera 10MB.'); input.value=''; return;
    }
    er('fileError','');
    document.getElementById('filenameLabel').textContent = '✔ ' + file.name;
    document.getElementById('filenameLabel').style.display = 'block';
    if (file.type.startsWith('image/')) {
      const r = new FileReader();
      r.onload = e => { const img=document.getElementById('preview-img'); img.src=e.target.result; img.style.display='block'; };
      r.readAsDataURL(file);
    }
  }

  const ua = document.getElementById('uploadArea');
  ua.addEventListener('dragover',  e => { e.preventDefault(); ua.style.borderColor='#7c3aed'; });
  ua.addEventListener('dragleave', () => { ua.style.borderColor='#444'; });
  ua.addEventListener('drop', e => {
    e.preventDefault(); ua.style.borderColor='#444';
    const fi=document.getElementById('comprobante'); fi.files=e.dataTransfer.files; handleFile(fi);
  });

  async function enviar() {
    const fi = document.getElementById('comprobante');
    if (!fi.files.length) { er('fileError','Sube el comprobante.'); return; }

    setLoad('btnEnviar','eText','eLoad', true);

    // 1. Subir a Cloudinary
    let urlComprobante;
    try {
      document.getElementById('uploadStatus').textContent = '⏳ Subiendo comprobante…';
      document.getElementById('uploadStatus').style.display = 'block';
      const fd = new FormData();
      fd.append('file', fi.files[0]);
      fd.append('upload_preset', CLD_PRESET);
      fd.append('folder', 'comprobantes');
      const res  = await fetch(CLD_URL, { method:'POST', body:fd });
      const data = await res.json();
      if (!data.secure_url) throw new Error();
      urlComprobante = data.secure_url;
      document.getElementById('uploadStatus').textContent = '✔ Comprobante subido';
    } catch(e) {
      document.getElementById('uploadStatus').textContent = '⚠️ Error al subir. Intenta de nuevo.';
      setLoad('btnEnviar','eText','eLoad', false); return;
    }

    // 2. Enviar al Apps Script via form oculto (sin CORS)
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = GAS_URL;
    form.target = 'hidden_iframe';
    [['accion','subirComprobante'],['departamento',deptoOk],['urlComprobante',urlComprobante]]
      .forEach(([k,v]) => { const i=document.createElement('input'); i.type='hidden'; i.name=k; i.value=v; form.appendChild(i); });
    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);

    setTimeout(() => {
      setLoad('btnEnviar','eText','eLoad', false);
      toast('ok','✅ Comprobante enviado correctamente. Será revisado por la administración.');
      // Reset
      document.getElementById('comprobante').value = '';
      document.getElementById('preview-img').style.display = 'none';
      document.getElementById('filenameLabel').style.display = 'none';
      document.getElementById('uploadStatus').style.display = 'none';
      document.getElementById('paso2').style.display = 'none';
      document.getElementById('inputDepto').value = '';
      document.getElementById('inputCI').value = '';
      document.getElementById('paso1').style.display = '';
    }, 1500);
  }

  // ── Helpers ────────────────────────────────────────────────────────
  function er(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg; el.style.display = msg ? 'block' : 'none';
  }
  function setLoad(btn, txtId, ldId, on) {
    document.getElementById(btn).disabled           = on;
    document.getElementById(txtId).style.display    = on ? 'none'   : 'inline';
    document.getElementById(ldId).style.display     = on ? 'inline' : 'none';
  }
  function toast(type, msg) {
    const t = document.getElementById('toast');
    t.className = type; t.textContent = msg; t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 6000);
  }
</script>
</body>
</html>
